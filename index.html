<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Operations Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- SVG Icons are inline to avoid external dependencies -->
    <style>
        /* CSS Variables */
        :root {
            /* Light Theme */
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --surface-hover: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --primary-accent: #2563eb;
            --primary-accent-hover: #1d4ed8;

            --status-healthy: #10b981;
            --status-healthy-bg: #d1fae5;
            --status-warning: #f59e0b;
            --status-warning-bg: #fef3c7;
            --status-alarm: #ef4444;
            --status-alarm-bg: #fee2e2;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-md: 8px;
            --radius-lg: 12px;

            --transition: all 0.2s ease-in-out;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --surface-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --primary-accent: #3b82f6;
            --primary-accent-hover: #60a5fa;

            --status-healthy: #34d399;
            --status-healthy-bg: rgba(16, 185, 129, 0.15);
            --status-warning: #fbbf24;
            --status-warning-bg: rgba(245, 158, 11, 0.15);
            --status-alarm: #f87171;
            --status-alarm-bg: rgba(239, 68, 68, 0.15);

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }

        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .app-header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header-title-container h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-title-container p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .last-refreshed {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        /* ============================================================
           OLD IMPLEMENTATION
           Reason: UI/UX Refinement - Added button scale and elevation
           Date: 2026-06-21
        ============================================================ */
        /*
        .btn:hover {
            background-color: var(--surface-hover);
        }
        */
        .btn:hover {
            background-color: var(--surface-hover);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(1px) scale(0.98);
        }
        .spinning-icon {
            animation: spin 1s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-primary {
            background-color: var(--primary-accent);
            color: white;
            border-color: var(--primary-accent);
        }

        .btn-primary:hover {
            background-color: var(--primary-accent-hover);
            border-color: var(--primary-accent-hover);
        }

        .btn-icon {
            padding: 0.5rem;
            border-radius: 50%;
        }

        /* Main Layout */
        .app-main {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .summary-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: var(--transition);
        }

        /* ============================================================
           OLD IMPLEMENTATION
           Reason: UI/UX Refinement - Improved summary card elevation
           Date: 2026-06-21
        ============================================================ */
        /*
        .summary-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        */
        .summary-card { position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .summary-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .summary-value {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Content Layout */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1.5rem;
            align-items: start;
        }

        /* List Section */
        .list-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            background-color: var(--surface-color);
            padding: 1rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 0.75rem;
            color: var(--text-secondary);
            width: 1rem;
            height: 1rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input {
            padding-left: 2.25rem;
        }

        input:focus,
        select:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Asset List */
        .asset-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .asset-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        /* ============================================================
           OLD IMPLEMENTATION
           Reason: UI/UX Refinement - Improved asset card hover scaling
           Date: 2026-06-21
        ============================================================ */
        /*
        .asset-card:hover {
            border-color: var(--primary-accent);
            background-color: var(--surface-hover);
        }
        */
        .asset-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .asset-card:hover {
            border-color: var(--primary-accent);
            background-color: var(--surface-hover);
            transform: translateY(-2px) scale(1.005);
            box-shadow: var(--shadow-md);
            z-index: 10;
        }

        .asset-card.selected {
            border-color: var(--primary-accent);
            background-color: var(--surface-hover);
            box-shadow: 0 0 0 1px var(--primary-accent);
        }

        .asset-card.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: var(--primary-accent);
        }

        .asset-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .asset-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .asset-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .badge.healthy {
            background-color: var(--status-healthy-bg);
            color: var(--status-healthy);
        }

        .badge.warning {
            background-color: var(--status-warning-bg);
            color: var(--status-warning);
        }

        .badge.alarm {
            background-color: var(--status-alarm-bg);
            color: var(--status-alarm);
        }

        .health-bar-container {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .health-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .health-bar-bg {
            height: 6px;
            background-color: var(--border-color);
            border-radius: 999px;
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.5s ease-out;
        }

        /* Detail Panel */
        .detail-panel {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            position: sticky;
            top: 6rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-title h2 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .data-point {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .data-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .data-value {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: baseline;
            gap: 0.25rem;
        }

        .data-unit {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .recommendation-box {
            padding: 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .recommendation-box svg {
            flex-shrink: 0;
            width: 1.25rem;
            height: 1.25rem;
        }

        .trend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            font-weight: 500;
        .trend-improving { color: var(--status-healthy); }
        .trend-declining { color: var(--status-alarm); }
        .trend-stable { color: var(--text-secondary); }
        */
        .trend-improving { color: #10b981; background-color: rgba(16, 185, 129, 0.1); padding: 0.25rem 0.5rem; }
        .trend-declining { color: #ef4444; background-color: rgba(239, 68, 68, 0.1); padding: 0.25rem 0.5rem; }
        .trend-stable { color: #64748b; background-color: rgba(100, 116, 139, 0.1); padding: 0.25rem 0.5rem; }
        [data-theme="dark"] .trend-improving { color: #34d399; }
        [data-theme="dark"] .trend-declining { color: #f87171; }
        [data-theme="dark"] .trend-stable { color: #94a3b8; }
        }

        /* Empty States */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            background-color: var(--surface-color);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-lg);
        }

        .empty-state svg {
            width: 3rem;
            height: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: var(--text-primary);
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(15, 23, 42, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            backdrop-filter: blur(2px);
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .spinning-icon {
            animation: spin 1s linear infinite;
        }

        .placeholder-detail {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            color: var(--text-secondary);
            text-align: center;
        }

        .placeholder-detail svg {
            width: 4rem;
            height: 4rem;
            margin-bottom: 1rem;
            opacity: 0.2;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content-layout {
                grid-template-columns: 1fr;
            }

            .detail-panel {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .asset-card {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .app-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                padding: 1rem;
            }

            .header-actions {
                width: 100%;
                justify-content: space-between;
            }

            .app-main {
                padding: 1rem;
            }
        }
    </style>
</head>

<body data-theme="dark">

    <div class="loading-overlay" id="loadingOverlay">

    </div>

    <!-- Header -->
    <header class="app-header">
        <!-- ============================================================
             OLD IMPLEMENTATION

        ============================================================

            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>

            </h1>

            ============================================================

                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                Refresh Data
            </button>
        </div>
    </header>

    <main class="app-main">
        <!-- Summary Cards -->
        <section class="summary-grid" id="summaryGrid">
            <!-- Cards injected via JS -->
        </section>

        <!-- Main Content Layout -->
        <div class="content-layout">
            <!-- List Section -->
            <div class="list-section">
                <div class="toolbar">
                    <div class="input-group">
                        <label for="searchInput">Search Assets</label>
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                            <input type="text" id="searchInput" placeholder="Search by name or ID...">
                        </div>
                    </div>
                    <div class="input-group" style="flex: 0.5;">
                        <label for="severityFilter">Severity</label>
                        <select id="severityFilter">
                            <option value="All">All</option>
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex: 0.5;">
                        <label for="healthSort">Sort By Health</label>
                        <select id="healthSort">
                            <option value="none">Default</option>
                            <option value="asc">Low to High</option>
                            <option value="desc">High to Low</option>
                        </select>
                    </div>
                </div>

                <div class="asset-list" id="assetList">
                    <!-- List injected via JS -->
                </div>
            </div>

            <!-- Detail Panel -->
            <aside class="detail-panel" id="detailPanel">
                <!-- Details injected via JS -->
            </aside>
        </div>
    </main>

    <script>
        /**

            setTimeout(() => {
                state.lastRefreshed = new Date();
                elements.lastRefreshedTime.textContent = formatTime(state.lastRefreshed);

    # Mini Operations Dashboard
    
    ## How to Run the Project
    This project requires no build tools, dependencies, or local servers.
    Simply open this \`index.html\` file in any modern web browser (Chrome, Edge, Firefox, Safari).
    
    ## Implemented Features
    - **Header**: Contains Dashboard Title, Description, Theme Toggle, and a simulated Refresh mechanism.
    - **Summary Cards**: Dynamically aggregates total counts, health statuses, and calculates average system health.
    - **Asset List**: Renders all industrial assets with health bars, trend indicators, and formatted metrics.
    - **Search/Filter/Sort**: Provides real-time composite filtering by Asset Name/ID, Severity dropdown filtering, and Health Score sorting.
    - **Detail Panel**: Clicking an asset displays comprehensive telemetry and context-sensitive diagnostic recommendations.
    - **Responsive Design**: Gracefully degrades to a stacked layout on mobile devices.
    - **Empty States**: Professional fallback UI when no assets match search criteria.
    
    ## Optional Enhancements Included
    1. **Dark/Light Theme Toggle**: Implemented using pure CSS variables and persisted in \`localStorage\`.
    2. **State Persistence**: The last selected asset is remembered across page reloads using \`localStorage\`.
    3. **Visual Health Bars**: Integrated directly into both the list and detail views for rapid visual assessment.
    4. **Trend Indicators**: A separate data mapping handles performance trends (Improving, Stable, Declining) without mutating the original dataset.
    5. **Graceful Handling of Missing Data**: Robust fallback wrappers ensure UI integrity if asset fields are ever missing or undefined.
    
    ## Assumptions & Architectural Decisions
    - **Single File Structure**: In adherence to strict submission guidelines, all CSS and JS is tightly integrated within this single HTML file.
    - **Dataset Preservation**: The provided dataset was retained verbatim. Extra features (like Trends) map to IDs instead of altering the raw dataset objects.
    - **Refresh Simulation**: The refresh button creates a realistic 800ms loading overlay delay to simulate network latency while retaining search/sort states.
    - **UI/UX Strategy**: Designed using a palette inspired by industrial control systems (deep slates, high-contrast statuses) to simulate production software used by companies like Siemens or Honeywell.
